name: Browser Tests (Playwright)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  playwright:
    name: Playwright — Extension + Web App
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js ──────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Dependencies ─────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Playwright browsers ───────────────────────────────────────────────
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: tests/playwright

      # ── sync-server ───────────────────────────────────────────────────────
      - name: Install sync-server dependencies
        run: npm ci
        working-directory: sync-server

      # ── web-app static server ─────────────────────────────────────────────
      - name: Install web-app dependencies
        run: npm ci
        working-directory: web-app

      # ── Run tests ─────────────────────────────────────────────────────────
      # global-setup.ts starts sync-server and serve; no manual step needed
      - name: Run Playwright tests
        run: npx playwright test
        working-directory: tests/playwright
        env:
          CI: true

      # ── Artifacts ─────────────────────────────────────────────────────────
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright/playwright-report/
          retention-days: 14

      - name: Upload test failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: tests/playwright/test-results/
          retention-days: 7

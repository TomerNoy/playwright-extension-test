# CI pipeline — runs Playwright tests on every push/PR.
# Starts servers via global-setup.js, so no manual server steps needed here.

name: Browser Tests (Playwright)

on:
  workflow_dispatch:

jobs:
  playwright:
    name: Playwright — Extension + Web App
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # `npm ci` installs from lock file (faster, deterministic, CI-friendly)
      - name: Install dependencies
        run: npm ci

      # --with-deps installs OS-level libs Chromium needs (e.g. libgbm, Xvfb).
      # Xvfb (virtual framebuffer) is required because extensions need headless:false,
      # and Playwright auto-launches Xvfb on Linux when no real display is available.
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: tests/playwright

      - name: Install sync-server dependencies
        run: npm ci
        working-directory: sync-server

      - name: Install web-app dependencies
        run: npm ci
        working-directory: web-app

      # global-setup.js starts both servers automatically
      - name: Run Playwright tests
        run: npx playwright test
        working-directory: tests/playwright
        env:
          CI: true

      # Upload reports/artifacts regardless of pass/fail
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright/playwright-report/
          retention-days: 14

      - name: Upload test failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: tests/playwright/test-results/
          retention-days: 7
